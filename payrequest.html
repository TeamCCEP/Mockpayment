<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mock Payment Gateway</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 10px; background-color: #f4f4f4; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; width: 95%; box-sizing: border-box; }
        .logo { width: 100%; max-width: 150px; display: block; margin: 0 auto 20px auto; }
        .warning { background: #fff3cd; border: 1px solid #ffeeba; padding: 12px; margin-bottom: 20px; color: #856404; font-size: 0.85em; border-radius: 4px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; font-size: 14px; }
        /* Font size 16px+ prevents iOS auto-zoom on input focus */
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .row > div { flex: 1 1 100px; }
        button { width: 100%; background: #0066cc; color: white; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0052a3; }
        #orderDisplay { font-weight: bold; color: #0066cc; }
        
        /* Mobile specific adjustments */
        @media (max-width: 400px) {
            .row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="./Images/Dominos-Pizza.png" alt="Dominos Logo" class="logo">
    
    <div class="warning">
        <strong>MOCK PAGE ONLY:</strong> Simulation for testing. Do not enter real card details.
    </div>

    <h2>Checkout</h2>
    <p>Order ID: <span id="orderDisplay">None</span></p>
    
    <div class="form-group" id="webhookContainer">
        <label>Notification Webhook URL:</label>
        <input type="url" id="webhookUrl" placeholder="https://webhook.site/...">
    </div>

    <hr>

    <div class="form-group">
        <label>Cardholder Name</label>
        <input type="text" id="name" placeholder="John Doe">
    </div>

    <div class="form-group">
        <label>Card Number</label>
        <input type="text" id="card" inputmode="numeric" placeholder="0000 0000 0000 0000">
    </div>

    <div class="row">
        <div class="form-group">
            <label>Expiry (MM/YY)</label>
            <input type="text" id="expiry" placeholder="MM/YY">
        </div>
        <div class="form-group">
            <label>CVV</label>
            <input type="text" id="cvv" inputmode="numeric" placeholder="123">
        </div>
    </div>

    <div class="form-group">
        <label>Postcode</label>
        <input type="text" id="postcode" placeholder="SW1A 1AA">
    </div>

    <button onclick="processPayment()">Pay Now</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderid') || "N/A";
        const mobile = urlParams.get('mobile') || "";
        const paymentAmount = urlParams.get('paymentamount') || "0.00";
        const wa = urlParams.get('wa') === 'true';
        
        document.getElementById('orderDisplay').innerText = orderId;
        if (wa) document.getElementById('webhookContainer').style.display = 'none';

        window.processPayment = async function() {
            const url = wa ? "https://hooks.uk.webexconnect.io/events/YZPWR9ZJXN" : document.getElementById('webhookUrl').value;
            if (!url) { alert("Please enter a valid Webhook URL."); return; }

            const data = wa ? { "paymentstatus": "accepted", "paymentamount": paymentAmount, "mobile": mobile, "orderid": orderId } 
                            : { "paymentstatus": "Approved", "orderid": orderId };

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("Payment processed successfully!");
            } catch (error) {
                console.error("Error:", error);
                alert("Network Error. Check the console.");
            }
        };
    });
</script>
</body>
</html>
