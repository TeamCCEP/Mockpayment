<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webex Connect Data Trigger</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f4; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Trigger Order Event</h2>
    
    <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="mobilenum" value="+447577740451">
    </div>
    <div class="form-group">
        <label>Last Order Date</label>
        <input type="text" id="lastorderdate" value="29/6/26">
    </div>
    <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" value="Carl">
    </div>
    <div class="form-group">
        <label>Order Summary</label>
        <input type="text" id="lastordersummary" value="One large Pepperoni Passion with stuffed crust">
    </div>
    <div class="form-group">
        <label>Cost</label>
        <input type="text" id="lastordercost" value="£28.99">
    </div>
    <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" id="deliveryaddress" value="18 Gadebury Heights">
    </div>
    <div class="form-group">
        <label>Store</label>
        <input type="text" id="collectionstore" value="Hemel Hempstead Central">
    </div>
    <div class="form-group">
        <label>Method</label>
        <select id="lastordermethod">
            <option value="collection">Collection</option>
            <option value="delivery">Delivery</option>
        </select>
    </div>

    <button onclick="triggerEvent()">Send Event</button>
</div>

<script>
    async function triggerEvent() {
        const url = "https://hooks.uk.webexconnect.io/events/D416TREPR0";
        
        const payload = {
            "mobilenum": document.getElementById('mobilenum').value,
            "lastorderdate": document.getElementById('lastorderdate').value,
            "name": document.getElementById('name').value,
            "lastordersummary": document.getElementById('lastordersummary').value,
            "lastordercost": document.getElementById('lastordercost').value,
            "deliveryaddress": document.getElementById('deliveryaddress').value,
            "collectionstore": document.getElementById('collectionstore').value,
            "lastordermethod": document.getElementById('lastordermethod').value
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Event triggered successfully!");
            } else {
                alert("Server returned error: " + response.status);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Network/CORS error. Check console.");
        }
    }
</script>
</body>
</html>
